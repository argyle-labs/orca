# /etc/pve/lxc/116.conf — nas-a (NFS gateway VM/CT) — minimal config with
# hostname + onboot + startup ordering, no mounts. Used by parser tests.
arch: amd64
cores: 4
features: nesting=1
hostname: nas-a
memory: 8192
net0: name=eth0,bridge=vmbr0,firewall=1,gw=192.0.2.1,hwaddr=02:00:00:00:00:01,ip=192.0.2.29/24,type=veth
onboot: 1
ostype: debian
rootfs: local-lvm:vm-116-disk-0,size=20G
startup: order=3,up=30,down=60
swap: 1024
unprivileged: 1
