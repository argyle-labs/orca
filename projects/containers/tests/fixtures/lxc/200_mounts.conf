# /etc/pve/lxc/200.conf — CT with two bind mounts. mp0 is read-write, mp1
# is read-only. Verifies the parser threads both flags through correctly.
arch: amd64
cores: 2
hostname: media
memory: 4096
mp0: /mnt/pool/data,mp=/data
mp1: /mnt/pool/configs,mp=/config,ro=1
net0: name=eth0,bridge=vmbr0,hwaddr=02:00:00:00:00:01,ip=dhcp,type=veth
onboot: 0
ostype: ubuntu
rootfs: local-lvm:vm-200-disk-0,size=12G
swap: 512
unprivileged: 1
