# /etc/pve/lxc/400.conf — CT created without a `hostname:` line. Parser must
# yield `hostname: None` and still process the rest of the file.
arch: amd64
cores: 1
memory: 512
net0: name=eth0,bridge=vmbr0,hwaddr=02:00:00:00:00:01,ip=dhcp,type=veth
onboot: 1
ostype: debian
rootfs: local-lvm:vm-400-disk-0,size=8G
swap: 256
unprivileged: 1
