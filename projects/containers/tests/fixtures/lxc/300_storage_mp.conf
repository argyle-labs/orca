# /etc/pve/lxc/300.conf — CT with a mix of bind mounts (mp0) and storage-
# backed mp lines (mp1=local-lvm, mp2=cephfs). The latter aren't candidates
# for the §2.2 mounts reconciler dep graph and should be classified as
# `MountSkipReason::StorageRef`.
arch: amd64
cores: 1
hostname: alpha
memory: 1024
mp0: /mnt/pool/backups,mp=/srv
mp1: local-lvm:vm-300-disk-1,mp=/lvm-extra
mp2: cephfs:subvol-300-data,mp=/ceph
net0: name=eth0,bridge=vmbr0,hwaddr=02:00:00:00:00:01,ip=dhcp,type=veth
onboot: 0
ostype: debian
rootfs: local-lvm:vm-300-disk-0,size=8G
swap: 512
unprivileged: 1
