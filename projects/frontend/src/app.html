<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%sveltekit.assets%/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>orca</title>
    <script>
      // Apply theme + sidebar default state synchronously before any CSS
      // parses so the first paint matches the user's stored preference and
      // the layout doesn't flash between SSR/prerender state and hydrated
      // state. Kept in sync with:
      //   - src/lib/stores/theme.svelte.ts (palettes / font sizes / keys)
      //   - src/lib/stores/sidebar.svelte.ts (breakpoint / pin key)
      (function () {
        var root = document.documentElement;

        // Suppress transitions until the first paint settles so the initial
        // layout doesn't animate from any default state. The class is removed
        // a tick later in the layout's onMount.
        root.classList.add('no-transitions');

        try {
          var PALETTES = ['violet', 'ocean', 'ice-age', 'forest', 'sunset', 'rose', 'mono'];
          var FONT_PX = { sm: 13, md: 15, lg: 17 };
          var p = localStorage.getItem('orca-palette');
          var m = localStorage.getItem('orca-mode');
          var f = localStorage.getItem('orca-font-size');
          root.setAttribute('data-theme', PALETTES.indexOf(p) >= 0 ? p : 'violet');
          root.setAttribute('data-mode', m === 'light' || m === 'dark' ? m : 'dark');
          root.style.fontSize = (FONT_PX[f] || 15) + 'px';
        } catch (_) {
          /* localStorage blocked — fall through to CSS defaults */
        }

        // Sidebar visibility is purely CSS-media-query-driven on load —
        // desktop = open, mobile = closed. No localStorage persistence: the
        // viewport always wins on a fresh page load and on resize across the
        // breakpoint. In-session toggles set data-sidebar at runtime but
        // don't survive a reload.
      })();
    </script>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
