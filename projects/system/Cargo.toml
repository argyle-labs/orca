[package]
name = "system"
version.workspace = true
edition.workspace = true

[lib]
name = "system"
path = "src/lib.rs"

[dependencies]
# `db-incore`: `managed_mounts` uses `endpoint_resource!` compiled INTO the
# daemon, so its CRUD needs the in-process pooled-connection fallback (no
# capability sink / host FFI channel in-core). Plugins never enable this.
plugin-toolkit = { path = "../plugin-toolkit", features = ["db-incore"] }
macro-runtime = { path = "../macro-runtime" }
dispatch   = { path = "../dispatch" }
plugin-loader = { path = "../plugin-loader" }
contract  = { path = "../contract", default-features = false }
derive     = { path = "../derive" }
schemars       = { workspace = true }
serde          = { workspace = true }
serde_json     = { workspace = true }
inventory      = { workspace = true }

utils = { path = "../utils" }
files = { path = "../files" }
agents = { path = "../plugins/agents", default-features = false }
db = { package = "db", path = "../db" }
notifications = { path = "../notifications" }
rusqlite = { workspace = true }
anyhow = { workspace = true }
async-trait = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }
clap         = { workspace = true }
sysinfo = { workspace = true }
if-addrs = { version = "0.14" }
dirs = { workspace = true }
sha2 = { workspace = true }
md-5 = "0.10"
colored      = { workspace = true }
axum         = { workspace = true, optional = true }
regex        = { workspace = true }

[dev-dependencies]
tempfile = { workspace = true }
serial_test = { workspace = true }

[lints]
workspace = true
