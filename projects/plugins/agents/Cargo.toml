[package]
name = "agents"
version.workspace = true
edition.workspace = true
build = "build.rs"

[lib]
name = "agents"
path = "src/lib.rs"
# `rlib` retains the in-crate `#[cfg(test)]` harness + lets the orca workspace
# link it as a normal Rust lib (core reads `compose_*` in-process). The plugin
# also ships as the `[[bin]]` below — a dynamic subprocess the loader spawns,
# not a dlopened cdylib.
crate-type = ["rlib"]

# A subprocess plugin is an executable, not a cdylib: orca's boot-time scan
# spawns it and speaks the UDS wire protocol to it. Mirrors the retired
# arr / dockge subprocess entrypoints.
[[bin]]
name = "agents"
path = "src/main.rs"

[dependencies]
# THIN PROFILE: agents authors tool surfaces via `#[orca_tool]` only, so it
# needs just the `tools` feature (contract/dispatch macro anchors). The `full`
# default leaked containers(bollard)/graphql/notify/openapi(progenitor) into the
# artifact for no reason. db/dispatch/contract remain via this crate's own
# direct deps below until the toolkit-only migration retires them.
plugin-toolkit = { path = "../../plugin-toolkit", default-features = false, features = ["tools"] }
macro-runtime = { path = "../../macro-runtime" }
dispatch        = { path = "../../dispatch" }
contract    = { path = "../../contract", default-features = false }
derive       = { path = "../../derive" }
schemars         = { workspace = true }
serde            = { workspace = true }
serde_json       = { workspace = true }
inventory        = { workspace = true }

utils = { path = "../../utils" }
db = { package = "db", path = "../../db" }
anyhow = { workspace = true }
async-trait = { workspace = true }
tokio = { workspace = true }
chrono = { workspace = true }
clap        = { workspace = true }
colored     = { workspace = true }
model = { path = "../../model" }
namespace = { path = "../../namespace" }

[lints]
workspace = true
