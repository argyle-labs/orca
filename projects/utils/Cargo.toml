[package]
name = "utils"
version.workspace = true
edition.workspace = true

[lib]
name = "utils"
path = "src/lib.rs"

# Tree-shakable: the heavy, module-exclusive stacks are optional so a consumer
# wanting only light utilities (time / hash / path / json_schema / search /
# framing / jsonrpc / mesh_status / shutdown / state) links none of
# reqwest+rustls, vendored libgit2, or the pki crypto stack. `default = ["full"]`
# keeps every existing consumer unchanged; a thin one sets
# `default-features = false` and opts back into just what it needs. See
# [[plugins-stay-thin]].
[features]
default = ["full"]
full = ["http", "git", "pki", "yaml", "schedule", "state", "rt", "search"]
# `utils::state` — daemon state file (needs `contract` for path resolution + an
# async poll helper). Heavy: pulls `contract` + tokio.
state = ["dep:contract", "rt"]
# `utils::framing` + `utils::shutdown` — async runtime helpers (tokio).
rt = ["dep:tokio", "dep:tokio-util"]
# `utils::search` — glob matching.
search = ["dep:glob"]
# `utils::yaml` — YAML deserialization (serde_yaml, unmaintained → confined here
# so it can be swapped with zero call-site churn). Off unless a consumer parses
# YAML.
yaml = ["dep:serde_yaml"]
# `utils::schedule` — cron parsing + firing-time math. Confines the `cron` crate
# (and its transitive chrono) so a scheduling consumer needs neither directly.
schedule = ["dep:cron"]
# `utils::http` — reqwest client + rustls TLS.
http = ["dep:reqwest", "dep:futures-util", "dep:rustls", "dep:rustls-pki-types", "dep:rustls-pemfile", "dep:tokio-rustls"]
# `utils::git` — vendored static libgit2 (large).
git = ["dep:git2"]
# `utils::pki` — X.509 + key generation.
pki = ["dep:rcgen", "dep:ed25519-dalek", "dep:x509-parser", "dep:rustls", "dep:rustls-pemfile"]

[dependencies]
# `contract` is used ONLY by the `state` module (daemon-state path resolution),
# so it is optional and gated behind the `state` feature — the light core
# (id/url/encoding/hash/time/path/…) links none of it. dispatch/derive/inventory/
# async-trait/clap were always-on but unused → removed. This is what lets
# `plugin_toolkit` re-export the light modules to plugins without dragging the
# core mesh crates. See [[plugins-stay-thin]].
contract  = { path = "../contract", default-features = false, optional = true }
tracing   = { workspace = true }

# Standard
anyhow     = { workspace = true }
thiserror  = { workspace = true }
chrono     = { workspace = true }
serde      = { workspace = true }
serde_json = { workspace = true }
url        = { workspace = true }
dirs       = { workspace = true }
sha2       = { workspace = true }
tempfile   = { workspace = true }
# ID generation (id module) — orca-owned `utils::id`, hides the UUID lib.
uuid        = { workspace = true }
# URL percent-encoding (url module) — orca-owned `utils::url`, hides the lib.
urlencoding = { workspace = true }
# YAML (yaml module) — gated by the `yaml` feature.
serde_yaml  = { workspace = true, optional = true }
# Cron (schedule module) — gated by the `schedule` feature.
cron        = { workspace = true, optional = true }

# Async (framing/shutdown/state) — gated behind the `rt` feature.
tokio = { workspace = true, optional = true }
tokio-util = { workspace = true, features = ["rt"], optional = true }

# HTTP/TLS (http module) — gated by the `http` / `pki` features.
reqwest = { workspace = true, optional = true }
futures-util = { workspace = true, optional = true }
rustls           = { workspace = true, optional = true }
rustls-pki-types = { workspace = true, optional = true }
rustls-pemfile   = { workspace = true, optional = true }
tokio-rustls     = { workspace = true, optional = true }
rcgen = { version = "0.14", features = ["pem", "x509-parser"], optional = true }
ed25519-dalek = { workspace = true, optional = true }
# rand / time / base64 are small and shared by light modules (json_schema,
# state), so they stay always-on rather than gate behind pki.
rand = { workspace = true }
time = { version = "0.3", default-features = false, features = ["std"] }
base64 = "0.22"
x509-parser = { version = "0.18", optional = true }

# Hashing (hash module)
blake3 = "1"

# Glob (search module) — gated behind the `search` feature.
glob   = { workspace = true, optional = true }

# libgit2 (git module) — vendored static, gated by the `git` feature.
git2 = { version = "0.20", default-features = false, features = ["vendored-libgit2", "vendored-openssl"], optional = true }

# JSON Schema model (json_schema module)
schemars = { workspace = true }

[dev-dependencies]
tokio    = { workspace = true }
tempfile = { workspace = true }
wiremock = "0.6"

[lints]
workspace = true
