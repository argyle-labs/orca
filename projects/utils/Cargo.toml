[package]
name = "utils"
version.workspace = true
edition.workspace = true

[lib]
name = "utils"
path = "src/lib.rs"

# Tree-shakable: the heavy, module-exclusive stacks are optional so a consumer
# wanting only light utilities (time / hash / path / json_schema / search /
# framing / jsonrpc / mesh_status / shutdown / state) links none of
# reqwest+rustls, vendored libgit2, or the pki crypto stack. `default = ["full"]`
# keeps every existing consumer unchanged; a thin one sets
# `default-features = false` and opts back into just what it needs. See
# [[plugins-stay-thin]].
[features]
default = ["full"]
full = ["http", "git", "pki"]
# `utils::http` — reqwest client + rustls TLS.
http = ["dep:reqwest", "dep:futures-util", "dep:rustls", "dep:rustls-pki-types", "dep:rustls-pemfile", "dep:tokio-rustls"]
# `utils::git` — vendored static libgit2 (large).
git = ["dep:git2"]
# `utils::pki` — X.509 + key generation.
pki = ["dep:rcgen", "dep:ed25519-dalek", "dep:x509-parser", "dep:rustls", "dep:rustls-pemfile"]

[dependencies]
dispatch  = { path = "../dispatch" }
contract  = { path = "../contract", default-features = false }
derive    = { path = "../derive" }
inventory = { workspace = true }
async-trait = { workspace = true }
tracing   = { workspace = true }
clap      = { workspace = true }

# Standard
anyhow     = { workspace = true }
thiserror  = { workspace = true }
chrono     = { workspace = true }
serde      = { workspace = true }
serde_json = { workspace = true }
url        = { workspace = true }
dirs       = { workspace = true }
sha2       = { workspace = true }
tempfile   = { workspace = true }

# Async
tokio = { workspace = true }
tokio-util = { workspace = true, features = ["rt"] }

# HTTP/TLS (http module) — gated by the `http` / `pki` features.
reqwest = { workspace = true, optional = true }
futures-util = { workspace = true, optional = true }
rustls           = { workspace = true, optional = true }
rustls-pki-types = { workspace = true, optional = true }
rustls-pemfile   = { workspace = true, optional = true }
tokio-rustls     = { workspace = true, optional = true }
rcgen = { version = "0.14", features = ["pem", "x509-parser"], optional = true }
ed25519-dalek = { workspace = true, optional = true }
# rand / time / base64 are small and shared by light modules (json_schema,
# state), so they stay always-on rather than gate behind pki.
rand = { workspace = true }
time = { version = "0.3", default-features = false, features = ["std"] }
base64 = "0.22"
x509-parser = { version = "0.18", optional = true }

# Hashing (hash module)
blake3 = "1"

# Glob (search module)
glob   = { workspace = true }

# libgit2 (git module) — vendored static, gated by the `git` feature.
git2 = { version = "0.20", default-features = false, features = ["vendored-libgit2", "vendored-openssl"], optional = true }

# JSON Schema model (json_schema module)
schemars = { workspace = true }

[dev-dependencies]
tokio    = { workspace = true }
tempfile = { workspace = true }
wiremock = "0.6"

[lints]
workspace = true
