name: Setup Rust release toolchain
description: >
  Installs Rust + the requested target, zigbuild (for Linux cross-compiles), mold
  on Linux hosts, and pre-warms the Swatinem cache. One step, used by every
  per-target release build so the toolchain setup is identical across the matrix.

inputs:
  target:
    description: Rust target triple (e.g. x86_64-unknown-linux-gnu).
    required: true
  install-zigbuild:
    description: Install cargo-zigbuild + zig (needed for Linux cross-compile from any host).
    required: false
    default: 'true'

runs:
  using: composite
  steps:
    - name: Isolate Rust toolchain home
      uses: ./.github/actions/isolate-rust-home

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Add cross-compile target
      shell: bash
      run: rustup target add ${{ inputs.target }}

    - name: Install mold (Linux only)
      if: runner.os == 'Linux'
      uses: rui314/setup-mold@v1

    - name: Install zig + cargo-zigbuild
      if: inputs.install-zigbuild == 'true'
      shell: bash
      run: |
        set -euo pipefail
        if ! command -v zig >/dev/null 2>&1; then
          if [ "$(uname -s)" = "Darwin" ]; then
            brew install zig
          else
            sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends curl xz-utils
            ZIG_VERSION=0.13.0
            curl -fsSL "https://ziglang.org/download/${ZIG_VERSION}/zig-linux-$(uname -m)-${ZIG_VERSION}.tar.xz" \
              | sudo tar -xJ -C /opt/
            sudo ln -sf "/opt/zig-linux-$(uname -m)-${ZIG_VERSION}/zig" /usr/local/bin/zig
          fi
        fi
        cargo install --locked cargo-zigbuild

    - name: Cargo cache
      uses: Swatinem/rust-cache@v2
      with:
        shared-key: release-rust-${{ inputs.target }}
        cache-on-failure: true
