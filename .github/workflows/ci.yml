name: CI

# Fast feedback on every push: build → upload artifact → download → test
# for each ecosystem. Tests run against the build output, not against
# re-compiled source.
#
# Run the "Release" workflow manually for full validation before a release.

on:
  # Runs on our own self-hosted runners (see runs-on labels below), outbound-only
  # to the forge — never internet-exposed. The label scheme is forge-portable:
  # the same [self-hosted, <os>, <arch>] labels work on GitHub Actions today and
  # on a future Gitea Actions runner with no workflow changes.
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel in-flight runs when a newer commit arrives on the same ref.
# Saves runner minutes on rapid-fire pushes / PR force-pushes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege token. The path detector now diffs locally with git (see the
# `changes` job), so no `pull-requests` scope or API access is needed —
# `contents: read` covers checkout, which is all CI requires.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # Disable per-target incremental files. Pointless on CI (each job starts
  # from a Swatinem-restored cache) and inflates the cache by GB.
  CARGO_INCREMENTAL: 0
  # CI does NOT use sccache. It was enabled here via RUSTC_WRAPPER=sccache +
  # SCCACHE_GHA_ENABLED, backed by GitHub's legacy Actions Cache API
  # (artifactcache v1) — which GitHub has permanently retired. The sccache daemon
  # can no longer start (HTTP 400 "services aren't available"), and because it is
  # the compiler wrapper, every Rust job died before compiling a line. Pin the
  # wrapper explicitly empty so a personal `~/.cargo/config.toml` rustc-wrapper
  # can't leak in either. Dependency caching stays, handled non-fatally by
  # Swatinem/rust-cache below.
  RUSTC_WRAPPER: ""

jobs:
  # ── Path-change detector ─────────────────────────────────────────────────
  # Each downstream job gates on the relevant boolean. A change to any
  # workflow YAML forces every job to run.
  changes:
    name: Detect changed paths
    runs-on: [self-hosted, linux, x64]
    outputs:
      workflows:               ${{ steps.filter.outputs.workflows }}
      rust:                    ${{ steps.filter.outputs.rust }}
    steps:
      # Full history so the detector can diff locally with git and NEVER call
      # the GitHub API. The previous dorny/paths-filter step fetched the
      # changed-file list over the REST API on every PR — a single point of
      # failure that skipped every downstream job whenever the API degraded.
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - id: filter
        name: Detect changed paths (git-native, no API)
        shell: bash
        env:
          EVENT: ${{ github.event_name }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          set -euo pipefail

          # Resolve the diff range without touching the GitHub API.
          range=""
          if [ "$EVENT" = "pull_request" ]; then
            git fetch --no-tags origin "$BASE_REF" >/dev/null 2>&1 || true
            if base_sha="$(git merge-base "origin/$BASE_REF" HEAD 2>/dev/null)"; then
              range="$base_sha...HEAD"
            fi
          elif git rev-parse HEAD^ >/dev/null 2>&1; then
            range="HEAD^...HEAD"
          fi

          # Fail OPEN: if the range can't be determined (first commit, shallow
          # history, detached edge cases), run everything rather than skip.
          if [ -z "$range" ]; then
            echo "Could not resolve diff range — running all jobs (fail-open)."
            {
              echo "workflows=true"
              echo "rust=true"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          changed="$(git diff --name-only "$range")"
          echo "Changed files in $range:"
          echo "$changed"

          workflows=false
          rust=false
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            case "$f" in
              .github/workflows/*) workflows=true ;;
            esac
            case "$f" in
              *.rs|*/Cargo.toml|Cargo.toml|Cargo.lock) rust=true ;;
            esac
          done <<< "$changed"

          {
            echo "workflows=$workflows"
            echo "rust=$rust"
          } >> "$GITHUB_OUTPUT"

  # ── Rust ─────────────────────────────────────────────────────────────────
  lint-rust:
    name: Lint Rust
    needs: changes
    if: needs.changes.outputs.rust == 'true' || needs.changes.outputs.workflows == 'true'
    runs-on: [self-hosted, linux, x64]
    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/isolate-rust-home

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt


      # rust-cache caches DEPENDENCIES (registry + dep artifacts). Lint is a
      # check-only build, so its own cache key keeps it from thrashing the test
      # job's profile.
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-rust-lint
          cache-on-failure: true

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: RUSTFLAGS="-D warnings" cargo clippy --tests --locked -- -D warnings

  # ── Rust tests — the fast PR gate ─────────────────────────────────────────
  # PRs run a NORMAL (non-instrumented) build so rust-cache stays warm and a
  # no-change run rebuilds little. Coverage instrumentation is a
  # separate, slower, poorly-cacheable profile — it is NOT on the PR hot path
  # (see coverage-rust, which runs on push to main only).
  test-rust:
    name: Test Rust
    needs: changes
    if: needs.changes.outputs.rust == 'true' || needs.changes.outputs.workflows == 'true'
    runs-on: [self-hosted, linux, x64]
    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/isolate-rust-home

      - uses: dtolnay/rust-toolchain@stable


      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-rust-test
          cache-on-failure: true

      - name: Unit + integration tests
        run: cargo nextest run --locked --workspace --no-fail-fast

  # ── Rust coverage — off the PR hot path ───────────────────────────────────
  # Runs only on push to main (not on PRs), because the instrumented build is the
  # slow, hard-to-cache profile and we want PR feedback fast. Still gates: a drop
  # below the floor fails the main build. Coverage ratchets toward 100% per
  # docs/coverage-baseline.md — raise `--fail-under-lines` as tests land; a change
  # may NEVER lower it.
  coverage-rust:
    name: Coverage Rust
    needs: changes
    if: github.event_name == 'push' && (needs.changes.outputs.rust == 'true' || needs.changes.outputs.workflows == 'true')
    runs-on: [self-hosted, linux, x64]
    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/isolate-rust-home

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview


      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-rust-cov
          cache-on-failure: true

      # Floor is the single source of truth in .coverage-floor (shared with the
      # Makefile `coverage` target and the README badge). Ratchet by editing that
      # file only; raise it every time tests land, never lower. Use exact-integer
      # floor — never round below.
      # Baseline 2026-05-19: 44.98% line. 2026-05-20: +2.54%. 2026-05-21b: +3.72%
      # (now 51.24% workspace lines).
      - name: Coverage gate (line coverage ≥ floor)
        run: cargo llvm-cov --locked --workspace --no-fail-fast --fail-under-lines "$(cat .coverage-floor)"

      - name: HTML report
        if: always()
        run: cargo llvm-cov report --html --output-dir target/llvm-cov

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-html
          path: target/llvm-cov/
          retention-days: 14
