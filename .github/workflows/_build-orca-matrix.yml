name: _build-orca-matrix
# Reusable workflow — builds every orca target with a given version baked into
# Cargo.toml. Called from release.yml for both the RC build and (after promote
# approval) the stable rebuild, so RC and stable share one definition.
#
# All build logic lives in .github/actions/build-orca-target, which in turn
# calls scripts/release-lib.sh. Same library used by scripts/release-local.sh.

on:
  workflow_call:
    inputs:
      version:
        description: Version to bake into Cargo.toml (e.g. 0.0.4-rc.1 or 0.0.4).
        required: true
        type: string
      artifact-suffix:
        description: Suffix appended to per-target artifact names (e.g. "" or "-stable").
        required: false
        type: string
        default: ''

jobs:
  build:
    name: Build ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        # GitHub-hosted runners (self-hosted retired — see ci.yml). Both Darwin
        # targets build on macos-latest (arm64: aarch64 native, x86_64 cross via
        # the shared Apple SDK). Linux x86_64 gnu+musl build on ubuntu-latest.
        # arm64-linux is intentionally not built — not shipped; add a native row
        # (e.g. ubuntu-24.04-arm) here if it is ever needed.
        include:
          - runner: '["macos-latest"]'
            target: aarch64-apple-darwin
          - runner: '["macos-latest"]'
            target: x86_64-apple-darwin
          - runner: '["ubuntu-latest"]'
            target: x86_64-unknown-linux-gnu
          - runner: '["ubuntu-latest"]'
            target: x86_64-unknown-linux-musl
    runs-on: ${{ fromJSON(matrix.runner) }}
    steps:
      - uses: actions/checkout@v5

      - name: Free disk space (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /opt/hostedtoolcache/CodeQL /usr/local/share/boost \
                      /usr/share/swift
          sudo docker image prune -af || true
          df -h

      - uses: ./.github/actions/setup-rust-release
        with:
          target: ${{ matrix.target }}

      - id: build
        uses: ./.github/actions/build-orca-target
        with:
          version: ${{ inputs.version }}
          target:  ${{ matrix.target }}

      - uses: actions/upload-artifact@v4
        with:
          name: orca-${{ matrix.target }}${{ inputs.artifact-suffix }}
          path: |
            ${{ steps.build.outputs.asset-path }}
            ${{ steps.build.outputs.checksum-path }}
          retention-days: 7
